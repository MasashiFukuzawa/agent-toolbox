name: ci
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Install pinned development tools
        run: |
          python -m pip install uv==0.8.3
          npm install -g @anthropic-ai/claude-code@2.1.7
      - run: uv sync --dev --locked
      - run: uv run ruff check .
      - run: uv run pytest
      - run: uv run python -m scripts.validate
      - run: uv run python -m scripts.trigger_eval --check
      - run: bash -n plugins/done/scripts/quality-gate-stop.sh
      - name: Validate Claude Code plugin manifest
        run: claude plugin validate .
  skill-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Run SkillSpector static scan
        run: bash tooling/skillspector-scan.sh /tmp/skillspector
