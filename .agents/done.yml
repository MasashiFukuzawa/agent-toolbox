version: 1
repo: agent-toolbox
verify:
  quick:
    - uv run ruff check .
    - uv run pytest
    - uv run python -m scripts.validate
    - uv run python -m scripts.trigger_eval --check
  standard:
    - uv run ruff check .
    - uv run pytest
    - uv run python -m scripts.validate
    - uv run python -m scripts.trigger_eval --check
    - bash -n plugins/done/scripts/quality-gate-stop.sh
  full:
    - uv run ruff check .
    - uv run pytest
    - uv run python -m scripts.validate
    - uv run python -m scripts.trigger_eval --check
    - bash -n plugins/done/scripts/quality-gate-stop.sh
